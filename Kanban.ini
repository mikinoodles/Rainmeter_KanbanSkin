;region Metadata
[Rainmeter]
Update=1000
AccurateText=1
DynamicWindowSize=1
SkinWidth=820

[Metadata]
Name=KanbanBoard

[MeasureScript]
Measure=Script
ScriptFile=#@#Kanban.lua
;endregion


;region Styles
[StyleColumnHeaderBackground]
Shape=Rectangle 0,0,220,36,6 | Fill Color 45,45,45,255 | StrokeWidth 1 | Stroke Color 90,90,90,255

[StyleColumnHeader]
FontFace=Segoe UI
FontSize=14
FontColor=255,255,255,255
AntiAlias=1
StringStyle=Bold
StringWidth=200

[StyleCardBackground]
Shape=Rectangle 0,0,220,72,8 | Fill Color 40,40,40,220 | StrokeWidth 1 | Stroke Color 90,90,90,255
DynamicVariables=1

[StyleCardSummary]
FontFace=Segoe UI
FontSize=11
FontColor=255,255,255,255
AntiAlias=1
ClipString=2
StringWidth=200
DynamicVariables=1

[StyleCardProjectBackground]
ProjectBgModifiers=Fill Color 10,10,10,220 | StrokeWidth 0 | Stroke Color 90,90,90,255

[StyleCardProject]
Shape=Rectangle 0,0,220,72,8 | Fill Color 40,40,40,220 | StrokeWidth 1 | Stroke Color 90,90,90,255
FontFace=Segoe UI
FontSize=9
FontColor=170,170,170,255
AntiAlias=1
ClipString=1
StringWidth=200
DynamicVariables=1
;endregion


;region Column Headers
[MeterAddTodoBackground]
Meter=Shape
Shape=Ellipse 40,38,18 | Fill Color 40,40,40,220 | StrokeWidth 1 | Stroke Color 90,90,90,255
LeftMouseUpAction=[!CommandMeasure "MeasureTodoSummaryInput" "ExecuteBatch 1"]

[MeterAddTodo]
Meter=Image
ImageName=#@#Images\plus.png
X=27
Y=26
W=25
H=25
LeftMouseUpAction=[!CommandMeasure "MeasureTodoSummaryInput" "ExecuteBatch 1"]
PreserveAspectRatio=1

[MeterTodoHeaderCard]
Meter=Shape
MeterStyle=StyleColumnHeaderBackground
X=60
Y=20
W=200
H=34
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(1)"]

[MeterTodoHeader]
Meter=String
MeterStyle=StyleColumnHeader
Text=TO DO
X=70
Y=27
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(1)"]

[MeterInProgressHeaderCard]
Meter=Shape
MeterStyle=StyleColumnHeaderBackground
X=300
Y=20
W=200
H=34
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(2)"]

[MeterInProgressHeader]
Meter=String
MeterStyle=StyleColumnHeader
Text=IN PROGRESS
X=310
Y=27
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(2)"]

[MeterDoneHeaderCard]
Meter=Shape
MeterStyle=StyleColumnHeaderBackground
X=540
Y=20
W=200
H=34
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(3)"]

[MeterDoneHeader]
Meter=String
MeterStyle=StyleColumnHeader
Text=DONE
X=550
Y=27
LeftMouseUpAction=[!CommandMeasure MeasureScript "DropTask(3)"]

[MeterClearDoneBackground]
Meter=Shape
Shape=Ellipse 780,38,18 | Fill Color 40,40,40,220 | StrokeWidth 1 | Stroke Color 90,90,90,255
LeftMouseUpAction=[!CommandMeasure MeasureScript "ClearDoneTasks()"]

[MeterClearDone]
Meter=Image
ImageName=#@#Images\delete.png
X=767
Y=24
W=25
H=25
LeftMouseUpAction=[!CommandMeasure MeasureScript "ClearDoneTasks()"]
PreserveAspectRatio=1
;endregion


;region Task Meter Templates
[TaskBackgroundTemplate]
Meter=Shape
MeterStyle=StyleCardBackground
